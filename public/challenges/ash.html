<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Checkpoint 2 — Office Jungle Hunt</title>
  <style>
    :root{--bg:#0A2A1B;--card:#0d3522;--green:#4ADE80;--gold:#FBBF24;--text:#e8f5e2;--muted:#86a87a;--border:#1e5c35;--error:#ef4444}
    *{box-sizing:border-box;margin:0;padding:0}
    body{background:var(--bg);color:var(--text);font-family:'Courier New',monospace;min-height:100dvh;display:flex;flex-direction:column;align-items:center;padding:1.5rem 1.25rem;gap:1.25rem}
    .card{background:var(--card);border:1px solid var(--border);border-radius:12px;padding:1.25rem;width:100%;max-width:440px;display:flex;flex-direction:column;gap:.75rem}
    h1{color:var(--green);font-size:1.2rem;letter-spacing:.06em;text-transform:uppercase}
    h2{color:var(--gold);font-size:1rem}
    p{line-height:1.6;font-size:.95rem}
    .fairy{width:80px}
    .muted{color:var(--muted);font-size:.875rem;font-style:italic}
    input{background:#071e12;border:1px solid var(--border);border-radius:8px;color:var(--text);font-family:'Courier New',monospace;font-size:1rem;padding:.75rem 1rem;width:100%;outline:none}
    input:focus{border-color:var(--green)}
    button{background:var(--green);color:#0A2A1B;font-family:'Courier New',monospace;font-size:.95rem;font-weight:bold;padding:.8rem 1.5rem;border:none;border-radius:8px;cursor:pointer;width:100%;text-transform:uppercase}
    .error{color:var(--error);font-size:.875rem}
    .success{color:var(--green);font-weight:bold}
    .try-item{color:var(--muted);font-size:.8rem;padding:.2rem 0;border-bottom:1px solid var(--border)}
    .back-btn{display:block;background:var(--green);color:#0A2A1B;font-family:'Courier New',monospace;font-size:.95rem;font-weight:bold;padding:.8rem 1.5rem;border-radius:8px;width:100%;text-transform:uppercase;text-align:center;text-decoration:none;margin-top:.5rem}
    .challenge-img{width:100%;border-radius:8px;border:1px solid var(--border)}
  </style>
</head>
<body>
  <img class="fairy" src="/assets/host_front.png" alt="Fairy" />
  <div class="card">
    <div style="display:flex;align-items:center;justify-content:space-between;gap:.5rem">
      <h1>Checkpoint 2 — Office GeoGuessr</h1>
      <span style="flex-shrink:0;font-size:.7rem;font-weight:bold;letter-spacing:.08em;padding:.2rem .55rem;border-radius:4px;background:#0d3522;color:#4ADE80;border:1px solid #4ADE8066">EASY</span>
    </div>
    <p class="muted">"The fairy's memory is fading... she remembers seeing this place. Can you identify it?"</p>
  </div>
  <div class="card">
    <h2>Where in the Office is This?</h2>
    <img class="challenge-img" src="/assets/challenge2.png" alt="Office location" />
    <p class="muted">Type the name of the room or location shown.</p>
  </div>
  <div class="card" id="answer-card">
    <p class="muted">Got it? Enter your answer:</p>
    <input id="answer-input" placeholder="Your answer..." autocapitalize="none" autocomplete="off" onkeydown="if(event.key==='Enter')check()" />
    <button onclick="check()">Submit →</button>
    <p id="error-msg" class="error"></p>
    <p id="tries-header" class="muted" style="display:none;font-size:.8rem;margin-top:.25rem">Previous tries:</p>
    <div id="tries-list"></div>
  </div>
  <script>
    const H='d77982267d9699c2a57bcab5bb975a1935f6427002f52fd4569762fd72db3a94'
    const tries=[]
    async function sha256(s){const b=await crypto.subtle.digest('SHA-256',new TextEncoder().encode(s.toUpperCase()));return[...new Uint8Array(b)].map(x=>x.toString(16).padStart(2,'0')).join('')}
    async function check(){
      const inp=document.getElementById('answer-input')
      const val=inp.value.trim()
      if(!val)return
      if(await sha256(val)===H){
        document.getElementById('answer-card').innerHTML='<p class="success" style="text-align:center;font-size:1rem">✨ The jungle spirits approve your answer!</p><a class="back-btn" href="/game?passphrase='+encodeURIComponent(val.toUpperCase())+'">Back to App →</a>'
      }else{
        tries.unshift(val);inp.value='';inp.focus()
        document.getElementById('error-msg').textContent="Not quite... look more carefully."
        document.getElementById('tries-header').style.display='block'
        document.getElementById('tries-list').innerHTML=tries.map(t=>'<div class="try-item">✗ '+t+'</div>').join('')
      }
    }
  </script>
</body>
</html>
