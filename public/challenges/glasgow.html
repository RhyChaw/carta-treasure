<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0" />
  <title>Checkpoint 6 — Office Jungle Hunt</title>
  <style>
    :root{--bg:#0A2A1B;--card:#0d3522;--green:#4ADE80;--gold:#FBBF24;--text:#e8f5e2;--muted:#86a87a;--border:#1e5c35;--error:#ef4444}
    *{box-sizing:border-box;margin:0;padding:0}
    body{background:var(--bg);color:var(--text);font-family:'Courier New',monospace;min-height:100dvh;display:flex;flex-direction:column;align-items:center;padding:1.5rem 1.25rem;gap:1.25rem}
    .card{background:var(--card);border:1px solid var(--border);border-radius:12px;padding:1.25rem;width:100%;max-width:440px;display:flex;flex-direction:column;gap:.75rem}
    h1{color:var(--green);font-size:1.2rem;letter-spacing:.06em;text-transform:uppercase}
    h2{color:var(--gold);font-size:1rem}
    p{line-height:1.6;font-size:.95rem}
    .fairy{width:80px}
    .muted{color:var(--muted);font-size:.875rem;font-style:italic}
    input{background:#071e12;border:1px solid var(--border);border-radius:8px;color:var(--text);font-family:'Courier New',monospace;font-size:1rem;padding:.75rem 1rem;width:100%;outline:none}
    input:focus{border-color:var(--green)}
    button{background:var(--green);color:#0A2A1B;font-family:'Courier New',monospace;font-size:.95rem;font-weight:bold;padding:.8rem 1.5rem;border:none;border-radius:8px;cursor:pointer;width:100%;text-transform:uppercase}
    .error{color:var(--error);font-size:.875rem}
    .success{color:var(--green);font-size:.875rem;font-weight:bold}
  </style>
</head>
<body>
  <img class="fairy" src="/assets/host.png" alt="Fairy" />
  <div class="card">
    <h1>Checkpoint 6 — Cipher Decode</h1>
    <p class="muted">"The fairy intercepted a coded message from the jungle spirits. Decode it to proceed."</p>
  </div>
  <div class="card">
    <h2>Caesar Cipher — Shift 3</h2>
    <p style="font-size:1.2rem;letter-spacing:.1em;color:var(--gold)">WKHBXQJOHLVDOLYH</p>
    <p class="muted">Each letter was shifted <strong>forward by 3</strong>. Shift it back to decode.</p>
    <p class="muted">Example: D→A, E→B, F→C ...</p>
    <input id="glas" placeholder="Decoded message (no spaces)..." autocapitalize="characters" />
    <button onclick="checkGlasgow()">Check Answer</button>
    <p id="glas-result"></p>
  </div>
  <script>
    function checkGlasgow() {
      const val = document.getElementById('glas').value.trim().toUpperCase().replace(/\s+/g,'');
      const el = document.getElementById('glas-result');
      if (val === 'THEJUNGLEISALIVE') { el.className='success'; el.textContent='✓ The spirits speak! Passphrase: THEJUNGLEISALIVE'; }
      else { el.className='error'; el.textContent="The cipher remains unbroken... try again."; }
    }
  </script>
</body>
</html>
